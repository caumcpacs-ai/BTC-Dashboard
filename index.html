<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Statistics Dashboard</title>
  <meta name="description" content="Beautiful statistics dashboard with charts, analytics and activity tracking" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app-wrapper">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon"></span>
        <span class="logo-text">GR Part 현황</span>
      </div>

      <div class="slicer-container" id="slicer-container">
        <!-- Slicers will be dynamically rendered here -->
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-toggle-group">
          <div class="toggle-item active"></div>
          <div class="toggle-item"></div>
        </div>
        <div class="sidebar-menu-lines">
          <span></span><span></span><span></span>
        </div>
      </div>
    </aside>

    <!-- ===== MAIN ===== -->
    <main class="main-content">

      <!-- COMPACT ACTION BAR -->
      <header class="topbar topbar-compact">
        <div class="topbar-search">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search..." />
        </div>
        <div class="topbar-actions">
          <div id="last-upload-time" class="upload-time-info"></div>
          <button class="action-btn" id="btn-upload" title="Upload File">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <input type="file" id="menu-file-upload" accept=".xlsx, .xls, .accdb" style="display: none;" />
        </div>
      </header>

      <!-- DASHBOARD: Vertical stacked charts -->
      <div class="dashboard-grid">

        <!-- NEW CHART: 전체 검사 현황 (고정) -->
        <div class="card chart-card" id="card-chart-total">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">전체 검사 현황 (고정)</h2>
              <p class="card-subtitle">전체 기간 월별 총 건수 (필터 미적용)</p>
            </div>
            <div id="badge-total-grand" class="avg-badge"></div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartTotalBar"></canvas>
          </div>
        </div>

        <!-- CHART 1: 월별 검사 현황 (전체 합계 선 그래프) -->
        <div class="card chart-card" id="card-chart1">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">월별 검사 현황</h2>
              <p class="card-subtitle">전체 촬영 건수 월별 추세</p>
            </div>
            <div id="badge-monthly-total" class="avg-badge"></div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartMonthlyTotal"></canvas>
          </div>
        </div>

        <!-- CHART 2: 연도별 월별 검사 현황 -->
        <div class="card chart-card" id="card-chart2">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">연도별 월별 검사 현황</h2>
              <p class="card-subtitle">연도별 1~12월 촬영 건수 비교</p>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartMonthlyByYear"></canvas>
          </div>
        </div>

        <!-- NEW CHART: 입원/외래/건진 월별 추세 (선 그래프) -->
        <div class="card chart-card" id="card-chart-inout-line">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">입원/외래/건진 월별 추세</h2>
              <p class="card-subtitle">환자 유형별 월별 검사 건수 추이</p>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartInOutLine"></canvas>
          </div>
        </div>

        <!-- CHART 3: 입원/외래 구분 월별 현황 -->
        <div class="card chart-card" id="card-chart3">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">입원/외래 구분 월별 현황</h2>
              <p class="card-subtitle">환자 유형별 비중 (전체)</p>
            </div>
          </div>
          <div class="chart-canvas-wrap" style="height:260px;">
            <canvas id="chartMonthlyInOut"></canvas>
          </div>
        </div>

        <!-- CHART 4: 시간대별 촬영 현황 -->
        <div class="card chart-card" id="card-chart4">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">시간대별 촬영 현황</h2>
              <p class="card-subtitle">시간(Hour)별 검사 건수 추세</p>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartHourly"></canvas>
          </div>
        </div>

        <!-- CHART 5: 처방과별 검사 비율 -->
        <div class="card chart-card" id="card-chart5">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">처방과별 검사 비율</h2>
              <p class="card-subtitle">상위 10개 처방과별 검사 건수</p>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartDept"></canvas>
          </div>
        </div>

        <!-- CHART 6: 요일별 검사 현황 -->
        <div class="card chart-card" id="card-chart6">
          <div class="chart-card-header">
            <div>
              <h2 class="card-title">요일별 검사 현황</h2>
              <p class="card-subtitle">요일별 촬영 건수 분포</p>
            </div>
          </div>
          <div class="chart-canvas-wrap">
            <canvas id="chartWeekday"></canvas>
          </div>
        </div>

      </div><!-- /dashboard-grid -->
    </main>
  </div>

  <script src="app.js"></script>
</body>

</html>
